<title>LittleNest AI</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#FAF7F2;display:flex;align-items:center;justify-content:center;min-height:100vh;}
.box{background:#fff;border:1px solid #EDE9E2;border-radius:20px;padding:48px 40px;max-width:400px;width:90%;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,0.06);}
.logo{font-family:'DM Serif Display',serif;font-size:24px;color:#1C1C1A;margin-bottom:6px;}
.logo span{color:#3D6B58;}
.tagline{font-size:13px;color:#888880;margin-bottom:32px;}
.label{font-size:12px;font-weight:600;color:#4A4A46;text-align:left;margin-bottom:6px;}
input{width:100%;padding:12px 16px;border:1.5px solid #EDE9E2;border-radius:10px;font-size:14px;font-family:'DM Sans',sans-serif;color:#1C1C1A;margin-bottom:12px;outline:none;}
input:focus{border-color:#3D6B58;}
button{width:100%;padding:13px;background:#3D6B58;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;}
button:hover{background:#2F5444;}
.error{font-size:12px;color:#c0392b;margin-top:10px;display:none;}
.badge{display:inline-flex;align-items:center;gap:6px;background:#EBF4EE;color:#3D6B58;font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px;margin-bottom:24px;}
</style>
